<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reviso</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      id="hljs-theme"
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/github.min.css"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="sidebar__header">
          <p class="eyebrow">Frontend Topics 2026</p>
          <h1>Reviso</h1>
          <p class="sidebar__copy">
            Quick interview revision with simple progress tracking.
          </p>
          <label class="theme-switcher" for="theme-select">
            <span class="theme-switcher__label">Theme</span>
            <select id="theme-select" class="theme-switcher__select" aria-label="Select theme">
              <option value="paper-light">Paper Light</option>
              <option value="vscode-dark">VS Code Dark</option>
              <option value="slate-light">Slate Light</option>
            </select>
          </label>
        </div>
        <div class="sidebar-search">
          <input
            id="topic-search"
            class="sidebar-search__input"
            type="search"
            placeholder="Search categories or topics"
            aria-label="Search categories or topics"
          />
        </div>
        <section id="progress" class="progress" aria-label="Revision progress"></section>
        <section id="topic-nav" class="topic-nav" aria-label="Topic navigation"></section>
      </aside>

      <main class="content">
        <article id="topic-content" class="topic-content"></article>
      </main>

      <aside
        id="playground-sidebar"
        class="playground-sidebar is-open"
        aria-label="Code playground"
      >
        <div class="playground-panel">
          <div class="playground-panel__header">
            <h2>Code Playground</h2>
            <div class="playground-actions">
              <button id="playground-run" type="button">Run</button>
              <button id="playground-reset" type="button">Reset</button>
            </div>
          </div>
          <div class="playground-workspace">
            <div id="playground-editor" class="playground-editor" aria-label="Code editor"></div>
            <div id="playground-empty" class="playground-empty" hidden>
              No runnable JavaScript example found in this note yet.
            </div>
            <div id="playground-console-panel" class="playground-console-panel" aria-label="Console">
              <div class="playground-console-panel__header">
                <h3>Console</h3>
                <div class="playground-actions">
                  <button id="playground-clear" type="button">Clear</button>
                </div>
              </div>
              <div id="playground-console" class="playground-console"></div>
            </div>
          </div>
        </div>
      </aside>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <script src="./reviso.config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
